        position: relative;

        align-items: center;

        content: '';

      /* ── スクリーンショットカード ── */

    <script>
      // ★ 音声長から自動生成されたシーンタイミング（generate.js が書き込む）
      const SCENE_TIMINGS = [{"id":"line1","start":0,"duration":10.914},{"id":"line2","start":10.914,"duration":8.922},{"id":"line3","start":19.836,"duration":9.77},{"id":"line4","start":29.606,"duration":7.406},{"id":"line5","start":37.012,"duration":10.867},{"id":"line6","start":47.879,"duration":6.887}];

      // ── 字幕コンテンツ定義（テキストとハイライト） ──
      // NOTE: 各シーンのテキストは generate.js が書き込んだ SCENE_TIMINGS と同じ順番
      const SCENE_CONTENTS = [
        // シーン1: 導入
        [
          { text: "話題の<span class='accent-cyan'>AI動画生成ツール『Antigravity』</span>！" },
          { text: "『どこからダウンロードするの？』<br>って人のために、" },
          { text: "今すぐ使える手順を<br><span class='accent-green'>世界一わかりやすく解説</span>するのだ！" }
        ],
        // シーン2: ステップ1
        [
          { text: "ステップ<span class='accent-yellow'>1</span>！まずは<span class='accent-cyan'>公式サイト</span>を開くのだ。" },
          { text: "URLはコメント欄や概要欄に<br>貼ってあるから、" },
          { text: "そこをポチッと押すだけで<span class='accent-green'>OK</span>なのだ！" }
        ],
        // シーン3: ステップ2（ダウンロードボタン）
        [
          { text: "ステップ<span class='accent-yellow'>2</span>！ページにある<span class='accent-green'><br>『ダウンロード』ボタン</span>を押すのだ。" },
          { text: "ファイルが保存されたら<br>ダブルクリックして起動！" },
          { text: "はい、準備はこれだけなのだ！" }
        ],
        // シーン4: ステップ3（呪文）
        [
          { text: "ステップ<span class='accent-yellow'>3</span>！起動したら、マイクに向かって" },
          { text: "この通りの<span class='accent-pink'>呪文</span>を言うだけなのだ。" },
          { text: "画面の文字をそのまま読み上げてね？" }
        ],
        // シーン5: 呪文詠唱
        [
          { text: "『HyperFramesとVOICEVOXで作成して。" },
          { text: "動画はHyperFrames以外では<br><span class='accent-pink'>絶対に作らないでね</span>』" },
          { text: "これだけで、AIが勝手に動き出して<br>動画を<span class='accent-green'>作ってくれる</span>のだ！" }
        ],
        // シーン6: まとめ
        [
          { text: "リンクとコピペ用の呪文は、<br>全部<span class='accent-yellow'>コメント欄</span>へ！" },
          { text: "今すぐダウンロードして<span class='accent-green'>試してみてね！</span>" }
        ]
      ];

      // ── シード固定の乱数（100%決定論的レンダリング用） ──
      function createSeededRandom(seed) {
        let h = seed ^ 0xdeadbeef;
        return function () {
          h = Math.imul(h ^ (h >>> 16), 2246822507);
          h = Math.imul(h ^ (h >>> 13), 3266489909);
          return ((h ^= h >>> 16) >>> 0) / 4294967296;
        };
      }

      // ── SCENE_TIMINGS が未定義の場合のフォールバック ──
      // （generate.js 実行前にプレビューする場合向け）
      const timings =
        typeof SCENE_TIMINGS !== 'undefined'
          ? SCENE_TIMINGS
          : SCENE_CONTENTS.map((_, i) => ({ id: `line${i + 1}`, start: i * 5, duration: 5 }));

      const totalDuration = timings.reduce((sum, t) => sum + t.duration, 0);

      // data-duration を動的に補正
      const rootEl = document.getElementById('root');
      if (rootEl) rootEl.setAttribute('data-duration', totalDuration.toString());

      // ── パーティクル初期化 ──
      const rand = createSeededRandom(98765);
      const particles = [];
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: rand() * 1920,
          y: rand() * 1080,
          size: rand() * 7 + 4,
          speedY: rand() * 60 + 35,
          amplitude: rand() * 45 + 15,
          frequency: rand() * 0.02 + 0.006,
          color: ['#00f0ff', '#3dff12', '#fff600', '#ff007c'][Math.floor(rand() * 4)],
          seed: rand() * 1000,
        });
      }

      function drawParticles(time) {
        const canvas = document.getElementById('particle-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 1920, 1080);
        particles.forEach((p) => {
          let cy = p.y - p.speedY * time;
          if (cy < -50) cy += Math.ceil(Math.abs(cy) / 1180) * 1180;
          else if (cy > 1130) cy -= 1180;
          const cx = p.x + Math.sin(time * p.frequency * Math.PI * 2 + p.seed) * p.amplitude;
          const opacity = 0.25 + Math.abs(Math.sin(time * 2.5 + p.seed)) * 0.65;
          ctx.save();
          ctx.globalAlpha = opacity;
          ctx.shadowBlur = p.size * 2.5;
          ctx.shadowColor = p.color;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(cx, cy, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });
      }

      // ── GSAP タイムライン構築 ──
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 背景グロー アニメーション
      tl.to('#bg-glow-1', { x: 190, y: -90, scale: 1.15, duration: totalDuration, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0);
      tl.to('#bg-glow-2', { x: -160, y: 120, scale: 1.10, duration: totalDuration, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0);
      tl.to('#bg-glow-3', { x: -100, y: -80, scale: 1.20, duration: totalDuration, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0);
      tl.to('#bg-glow-4', { x: 120,  y: 80,  scale: 1.15, duration: totalDuration, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0);

      // パーティクル描画
      const pConfig = { progress: 0 };
      tl.to(pConfig, {
        progress: 1,
        duration: totalDuration,
        ease: 'none',
        onUpdate: function () { drawParticles(this.time()); },
      }, 0);

      // 字幕コンテナのイントロ
      tl.from('.glass-container', { scale: 0.92, opacity: 0, duration: 0.5, ease: 'back.out(1.5)' }, 0.1);

      // ─── シーンごとのアニメーション ───
      timings.forEach((scene, sceneIdx) => {
        const sceneStart = scene.start;
        const sceneDur   = scene.duration;
        const segments   = SCENE_CONTENTS[sceneIdx] || [{ text: '' }];

        // ── シーン2（ステップ1）: スクリーンショットカードをスライドアップ + 字幕を上部へ移動
        if (sceneIdx === 1) {
          // カードをスライドアップ
          tl.to('#screenshot-card', {
            opacity: 1,
            y: 0,
            scale: 1.0,
            duration: 0.55,
            ease: 'back.out(1.3)',
          }, sceneStart + 0.2);

          // 字幕を上部へスライド（画面中央→上部 約180pxへ → -360px）
          tl.to('.glass-container', {
            y: -360,
            duration: 0.5,
            ease: 'power2.inOut',
          }, sceneStart + 0.15);
        }


        // ── シーン3（ステップ2）: ネオン枠を点滅させてダウンロードボタンを強調
        if (sceneIdx === 2) {
          tl.to('#glow-target-box', {
            opacity: 1,
            scale: 1.0,
            duration: 0.35,
            ease: 'back.out(2)',
          }, sceneStart + 0.3);

          const pulseCount = Math.max(2, Math.floor((sceneDur - 1.0) / 0.7));
          tl.to('#glow-target-box', {
            scale: 1.1,
            duration: 0.35,
            yoyo: true,
            repeat: pulseCount * 2 - 1,
            ease: 'sine.inOut',
          }, sceneStart + 0.65);
        }

        // ── シーン3終了時: カードをスライドダウンして非表示 + 字幕を画面中央へ戻す
        if (sceneIdx === 2) {
          const hideAt = sceneStart + sceneDur - 0.45;
          tl.to('#glow-target-box', { opacity: 0, scale: 0.85, duration: 0.3, ease: 'power2.in' }, hideAt);
          tl.to('#screenshot-card', { opacity: 0, y: 50, scale: 0.92, duration: 0.45, ease: 'power2.in' }, hideAt);

          // 字幕を画面中央へ戻す
          tl.to('.glass-container', {
            y: 0,
            duration: 0.45,
            ease: 'power2.inOut',
          }, hideAt + 0.05);
        }

        // ── シーン4（ステップ3）: 魔法の杖を表示
        if (sceneIdx === 3) {
          tl.set('#vfx-wand', { opacity: 1, scale: 0, rotation: -60, x: 500, y: 160 }, sceneStart);
          tl.to('#vfx-wand', { scale: 1, rotation: 15, duration: 0.45, ease: 'back.out(2)' }, sceneStart + 0.2);
          const floatCount = Math.max(2, Math.floor((sceneDur - 0.7) / 1.4));
          tl.to('#vfx-wand', { y: 200, rotation: -5, yoyo: true, repeat: floatCount * 2 - 1, duration: 0.7, ease: 'sine.inOut' }, sceneStart + 0.65);
        }

        // ── シーン5（呪文）でも杖を継続表示
        if (sceneIdx === 4) {
          const floatCount = Math.max(2, Math.floor(sceneDur / 1.4));
          tl.to('#vfx-wand', { y: 185, rotation: 10, yoyo: true, repeat: floatCount * 2 - 1, duration: 0.7, ease: 'sine.inOut' }, sceneStart);
        }

        // ── シーン6開始時: 杖を消す
        if (sceneIdx === 5) {
          tl.to('#vfx-wand', { opacity: 0, scale: 0, duration: 0.35, ease: 'power2.in' }, sceneStart - 0.2);
        }

        // ── 字幕セグメントのタイミング計算と表示 ──
        // 音声長を文字数で按分して各セグメントの表示時間を決定
        const totalChars = segments.reduce((s, seg) => s + seg.text.replace(/<[^>]*>/g, '').length, 0);
        let segCursor = sceneStart;

        segments.forEach((seg, segIdx) => {
          const charCount  = seg.text.replace(/<[^>]*>/g, '').length;
          const segDur     = totalChars > 0 ? (charCount / totalChars) * sceneDur : sceneDur;
          const segStart   = segCursor;

          // 字幕テキストを更新（音声ぴったりのタイミングで）
          tl.call(() => {
            const el = document.getElementById('shorts-caption');
            if (!el) return;
            el.innerHTML = seg.text;
            el.style.fontSize = '72px';
            // フォントが大きすぎる場合に縮小
            let attempts = 0;
            while (el.scrollHeight > 320 && attempts < 8) {
              const cur = parseFloat(window.getComputedStyle(el).fontSize);
              el.style.fontSize = (cur - 6) + 'px';
              attempts++;
            }
          }, null, segStart);

          // 字幕のポップインアニメーション
          tl.fromTo('#shorts-caption',
            { scale: 0.88, opacity: 0.6 },
            { scale: 1.0, opacity: 1, duration: 0.12, ease: 'back.out(2.5)' },
            segStart
          );

          segCursor += segDur;
        });
      });

      // アウトロフェード
      tl.to('.glass-container', { scale: 0.94, opacity: 0, duration: 0.4, ease: 'power2.in' }, totalDuration - 0.4);

      // タイムラインをグローバルに登録
      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
